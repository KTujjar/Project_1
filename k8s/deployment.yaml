apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-api
  labels:
    app: anomaly-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: anomaly-api
  template:
    metadata:
      labels:
        app: anomaly-api
    spec:
      containers:
        - name: anomaly-api
          image: anomaly-api:latest
          imagePullPolicy: Never        # use local image built via minikube docker-env
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: anomaly-api-config
          resources:
            requests:
              cpu: "125m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
